name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ghosttykit:
    uses: ./.github/workflows/build-ghosttykit.yml

  release:
    needs: ghosttykit
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download GhosttyKit
        uses: actions/download-artifact@v7
        with:
          name: GhosttyKit
          path: Frameworks

      - name: Verify GhosttyKit
        run: |
          ls -la Frameworks/GhosttyKit.xcframework/
          ls -la Frameworks/ghostty-resources/ | head -5

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ hashFiles('Package.resolved', '**/Package.resolved') }}
          restore-keys: spm-

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Run tests
        run: |
          cd Packages/MoriCore && swift run MoriCoreTests && cd ../..
          cd Packages/MoriPersistence && swift run MoriPersistenceTests && cd ../..
          cd Packages/MoriTmux && swift run MoriTmuxTests && cd ../..
          cd Packages/MoriIPC && swift run MoriIPCTests && cd ../..

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$CERT_PATH"

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "mori-notarize" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build, sign, and notarize Mori.app
        env:
          SIGNING_IDENTITY: "Developer ID Application: ${{ secrets.APPLE_DEVELOPER_NAME }} (${{ secrets.APPLE_TEAM_ID }})"
          KEYCHAIN_PROFILE: "mori-notarize"
        run: |
          MORI_VERSION="${GITHUB_REF_NAME#v}" bash scripts/bundle.sh

      - name: Create release archives
        env:
          SIGNING_IDENTITY: "Developer ID Application: ${{ secrets.APPLE_DEVELOPER_NAME }} (${{ secrets.APPLE_TEAM_ID }})"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Zip (--norsrc prevents ._ AppleDouble files when extracted with unzip)
          ditto -c -k --norsrc --keepParent Mori.app "Mori-${VERSION}-macos-arm64.zip"
          # DMG
          bash scripts/create-dmg.sh "$VERSION"

      - name: Generate appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/generate-appcast.sh "$VERSION" "Mori-${VERSION}-macos-arm64.zip"

      - name: Upload appcast artifact
        uses: actions/upload-artifact@v7
        with:
          name: appcast
          path: mori-appcast.xml

      - name: Create GitHub Release

        uses: softprops/action-gh-release@v2
        with:
          files: |
            Mori-*-macos-arm64.zip
            Mori-*-macos-arm64.dmg
          generate_release_notes: true

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Mori
        uses: actions/checkout@v5

      - name: Checkout tap repo
        uses: actions/checkout@v5
        with:
          repository: vaayne/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Resolve release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="Mori-${VERSION}-macos-arm64.zip"
          SHA256="$(gh release view "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq '.assets[] | select(.name == "'"${ZIP_NAME}"'") | (.digest // "") | sub("^sha256:"; "")')"

          if [[ -z "${SHA256}" ]]; then
            echo "Failed to resolve SHA256 for ${ZIP_NAME}" >&2
            exit 1
          fi

          {
            echo "VERSION=${VERSION}"
            echo "SHA256=${SHA256}"
          } >> "${GITHUB_ENV}"

      - name: Update tap cask
        run: bash scripts/update-homebrew-tap.sh
        env:
          VERSION: ${{ env.VERSION }}
          SHA256: ${{ env.SHA256 }}
          TAP_DIR: homebrew-tap

      - name: Download appcast artifact
        uses: actions/download-artifact@v7
        with:
          name: appcast

      - name: Commit and push tap + appcast update
        run: |
          set -euo pipefail
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Copy mori-appcast.xml into tap repo
          cp mori-appcast.xml homebrew-tap/mori-appcast.xml

          git -C homebrew-tap add Casks/mori.rb mori-appcast.xml

          if git -C homebrew-tap diff --cached --quiet; then
            echo "No tap changes to commit."
            exit 0
          fi

          git -C homebrew-tap commit -m "mori ${VERSION}"
          git -C homebrew-tap push
