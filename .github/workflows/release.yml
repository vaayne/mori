name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ghosttykit:
    uses: ./.github/workflows/build-ghosttykit.yml

  release:
    needs: ghosttykit
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download GhosttyKit
        uses: actions/download-artifact@v5
        with:
          name: GhosttyKit
          path: Frameworks

      - name: Verify GhosttyKit
        run: |
          ls -la Frameworks/GhosttyKit.xcframework/
          ls -la Frameworks/ghostty-resources/ | head -5

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ hashFiles('Package.resolved', '**/Package.resolved') }}
          restore-keys: spm-

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Run tests
        run: |
          cd Packages/MoriCore && swift run MoriCoreTests && cd ../..
          cd Packages/MoriPersistence && swift run MoriPersistenceTests && cd ../..
          cd Packages/MoriTmux && swift run MoriTmuxTests && cd ../..
          cd Packages/MoriIPC && swift run MoriIPCTests && cd ../..

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$CERT_PATH"

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "mori-notarize" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build, sign, and notarize Mori.app
        env:
          SIGNING_IDENTITY: "Developer ID Application: ${{ secrets.APPLE_DEVELOPER_NAME }} (${{ secrets.APPLE_TEAM_ID }})"
          KEYCHAIN_PROFILE: "mori-notarize"
        run: |
          MORI_VERSION="${GITHUB_REF_NAME#v}" bash scripts/bundle.sh

      - name: Create release archives
        env:
          SIGNING_IDENTITY: "Developer ID Application: ${{ secrets.APPLE_DEVELOPER_NAME }} (${{ secrets.APPLE_TEAM_ID }})"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Zip (--norsrc prevents ._ AppleDouble files when extracted with unzip)
          ditto -c -k --norsrc --keepParent Mori.app "Mori-${VERSION}-macos-arm64.zip"
          # DMG
          bash scripts/create-dmg.sh "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Mori-*-macos-arm64.zip
            Mori-*-macos-arm64.dmg
          generate_release_notes: true

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
