name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ghosttykit:
    uses: ./.github/workflows/build-ghosttykit.yml

  build-and-test:
    needs: ghosttykit
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download GhosttyKit
        uses: actions/download-artifact@v7
        with:
          name: GhosttyKit
          path: Frameworks

      - name: Verify GhosttyKit
        run: |
          ls -la Frameworks/GhosttyKit.xcframework/
          ls -la Frameworks/ghostty-resources/ | head -5

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ hashFiles('Package.resolved', '**/Package.resolved') }}
          restore-keys: spm-

      - name: Build (release)
        run: swift build -c release 2>&1

      - name: Test MoriCore
        run: cd Packages/MoriCore && swift run MoriCoreTests

      - name: Test MoriPersistence
        run: cd Packages/MoriPersistence && swift run MoriPersistenceTests

      - name: Test MoriTmux
        run: cd Packages/MoriTmux && swift run MoriTmuxTests

      - name: Test MoriIPC
        run: cd Packages/MoriIPC && swift run MoriIPCTests

  ios-build:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: MoriRemote/.derived-data-sim/SourcePackages
          key: spm-ios-${{ hashFiles('MoriRemote/MoriRemote.xcodeproj/project.pbxproj', '**/Package.resolved') }}
          restore-keys: spm-ios-

      - name: Install tools
        run: |
          brew install xcodegen xcbeautify

      - name: Stub GhosttyKit for SPM resolution
        run: |
          mkdir -p Frameworks/GhosttyKit.xcframework/macos-arm64_x86_64/GhosttyKit.framework/Headers
          touch Frameworks/GhosttyKit.xcframework/macos-arm64_x86_64/GhosttyKit.framework/GhosttyKit
          cat > Frameworks/GhosttyKit.xcframework/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>AvailableLibraries</key>
            <array>
              <dict>
                <key>LibraryIdentifier</key>
                <string>macos-arm64_x86_64</string>
                <key>LibraryPath</key>
                <string>GhosttyKit.framework</string>
                <key>SupportedArchitectures</key>
                <array><string>arm64</string><string>x86_64</string></array>
                <key>SupportedPlatform</key>
                <string>macos</string>
              </dict>
            </array>
            <key>CFBundlePackageType</key>
            <string>XFWK</string>
            <key>XCFrameworkFormatVersion</key>
            <string>1.0</string>
          </dict>
          </plist>
          PLIST

      - name: Generate Xcode project
        run: cd MoriRemote && xcodegen generate

      - name: Build for iOS Simulator
        run: |
          set -euo pipefail
          xcodebuild \
            -project MoriRemote/MoriRemote.xcodeproj \
            -scheme MoriRemote \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .derived-data-ios \
            build 2>&1 | xcbeautify

  bundle:
    needs: [ghosttykit, build-and-test]
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download GhosttyKit
        uses: actions/download-artifact@v7
        with:
          name: GhosttyKit
          path: Frameworks

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ hashFiles('Package.resolved', '**/Package.resolved') }}
          restore-keys: spm-

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Check signing availability
        id: signing
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        run: |
          if [[ -n "$CERT" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$CERT_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Set signing identity
        if: steps.signing.outputs.available == 'true'
        env:
          DEVELOPER_NAME: ${{ secrets.APPLE_DEVELOPER_NAME }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "SIGNING_IDENTITY=Developer ID Application: ${DEVELOPER_NAME} (${TEAM_ID})" >> "$GITHUB_ENV"

      - name: Bundle Mori.app
        run: bash scripts/bundle.sh

      - name: Upload Mori.app
        uses: actions/upload-artifact@v7
        with:
          name: Mori.app
          path: Mori.app
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
