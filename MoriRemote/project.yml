name: MoriRemote
options:
  bundleIdPrefix: com.vaayne.mori
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  MoriRemoteProtocol:
    path: ../Packages/MoriRemoteProtocol

targets:
  MoriRemote:
    type: application
    platform: iOS
    sources:
      - path: MoriRemote
        excludes:
          - "*.modulemap"
          - "*-Bridging-Header.h"
    resources:
      - path: MoriRemote/Resources
    dependencies:
      - framework: ../Frameworks/GhosttyKit.xcframework
      - package: MoriRemoteProtocol
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vaayne.mori.remote
        INFOPLIST_FILE: MoriRemote/Info.plist
        GENERATE_INFOPLIST_FILE: false
        OTHER_LDFLAGS:
          - "-lc++"
