name: MoriRemote
options:
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
packages:
  MoriCore:
    path: ../Packages/MoriCore
  MoriTmux:
    path: ../Packages/MoriTmux
  MoriSSH:
    path: ../Packages/MoriSSH
  MoriTerminal:
    path: ../Packages/MoriTerminal
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.13.0"
targets:
  MoriRemote:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MoriRemote
    dependencies:
      - package: MoriCore
        product: MoriCore
      - package: MoriTmux
        product: MoriTmux
      - package: MoriSSH
        product: MoriSSH
      - package: MoriTerminal
        product: MoriTerminal
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        PRODUCT_NAME: MoriRemote
        PRODUCT_BUNDLE_IDENTIFIER: com.vaayne.mori.remote
        INFOPLIST_FILE: MoriRemote/Info.plist
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        MARKETING_VERSION: ${MARKETING_VERSION:0.1.0}
        CURRENT_PROJECT_VERSION: ${CURRENT_PROJECT_VERSION:1}
schemes:
  MoriRemote:
    build:
      targets:
        MoriRemote: all
    archive:
      config: Release
