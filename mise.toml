min_version = "2025.10.0"

[tools]
jq = "latest"
ripgrep = "latest"
fd = "latest"
xcbeautify = "latest"
tmux = "latest"
zig = "0.15.2"

[env]
PROJECT_NAME = "Mori"
DERIVED_DATA = "{{cwd}}/.derived-data"

# ─── Core ────────────────────────────────────────────────────────

[tasks.dev]
description = "Build and run Mori"
depends = ["build"]
run = '''
swift run Mori
'''

[tasks.build]
description = "Debug build"
depends = ["build:ghostty"]
run = "swift build 2>&1 | xcbeautify"

[tasks."build:release"]
description = "Release build"
depends = ["build:ghostty"]
run = "swift build -c release 2>&1 | xcbeautify"

[tasks.test]
description = "Run all tests"
depends = ["test:core", "test:persistence", "test:tmux", "test:ipc"]

[tasks."test:core"]
run = "cd Packages/MoriCore && swift run MoriCoreTests"

[tasks."test:persistence"]
run = "cd Packages/MoriPersistence && swift run MoriPersistenceTests"

[tasks."test:tmux"]
run = "cd Packages/MoriTmux && swift run MoriTmuxTests"

[tasks."test:ipc"]
run = "cd Packages/MoriIPC && swift run MoriIPCTests"

[tasks."test:protocol"]
description = "Run MoriRemoteProtocol tests"
run = "cd Packages/MoriRemoteProtocol && swift run TestMoriRemoteProtocol"

[tasks."build:ghostty"]
description = "Build GhosttyKit XCFramework from source"
run = "bash scripts/build-ghostty.sh"

[tasks."ghostty:sync"]
description = "Sync ghostty fork with upstream and update submodule commit"
run = '''
set -euo pipefail

cd vendor/ghostty

# Ensure remotes are set up
if ! git remote get-url upstream &>/dev/null; then
  echo "Adding upstream remote..."
  git remote add upstream https://github.com/ghostty-org/ghostty.git
fi

BRANCH=$(git branch --show-current)
if [ -z "$BRANCH" ]; then
  echo "Error: ghostty submodule is in detached HEAD state."
  echo "Check out your working branch first: cd vendor/ghostty && git checkout mori/remote-backend"
  exit 1
fi

echo "On branch: $BRANCH"
echo "Fetching upstream..."
git fetch upstream

echo "Rebasing $BRANCH onto upstream/main..."
git rebase upstream/main

echo "Pushing to fork..."
git push origin "$BRANCH" --force-with-lease

cd ../..
echo "Updating submodule commit in mori..."
git add vendor/ghostty
echo ""
echo "Done. ghostty synced to latest upstream."
echo "Run 'git commit' to record the submodule update."
'''

[tasks.bundle]
description = "Build release and create Mori.app bundle"
run = "bash scripts/bundle.sh"

[tasks.clean]
description = "Clean build artifacts"
run = "swift package clean && rm -rf .build .derived-data Mori.app"

# ─── iOS (Mori Remote) ──────────────────────────────────────────

[tasks."ios:build"]
description = "Build MoriRemote iOS app for simulator"
depends = ["build:ghostty"]
run = '''
set -euo pipefail
cd MoriRemote
xcodegen generate
UDID=$(xcrun simctl list devices available -j | jq -r '.devices[][] | select(.name=="iPhone 16" and .isAvailable==true) | .udid' | head -1)
DEST="platform=iOS Simulator,id=${UDID:-generic/platform=iOS Simulator}"
xcodebuild \
  -project MoriRemote.xcodeproj \
  -scheme MoriRemote \
  -sdk iphonesimulator \
  -destination "$DEST" \
  build 2>&1 | xcbeautify
'''

[tasks."ios:run"]
description = "Build and run MoriRemote on iOS Simulator (iPhone 16)"
depends = ["ios:build"]
run = '''
set -euo pipefail
DEVICE="iPhone 16"
UDID=$(xcrun simctl list devices available -j | jq -r --arg name "$DEVICE" '.devices[][] | select(.name==$name and .isAvailable==true) | .udid' | head -1)
if [ -z "$UDID" ]; then
  echo "Error: No available simulator found for '$DEVICE'"
  exit 1
fi
echo "Booting $DEVICE ($UDID)..."
xcrun simctl boot "$UDID" 2>/dev/null || true
open -a Simulator

APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Debug-iphonesimulator/MoriRemote.app" -maxdepth 5 2>/dev/null | head -1)
if [ -z "$APP_PATH" ]; then
  echo "Error: MoriRemote.app not found in DerivedData. Run 'mise run ios:build' first."
  exit 1
fi

echo "Installing MoriRemote..."
xcrun simctl install "$UDID" "$APP_PATH"
echo "Launching MoriRemote..."
xcrun simctl launch "$UDID" com.vaayne.mori.remote
echo "MoriRemote running on $DEVICE"
'''

[tasks."ios:test"]
description = "Run MoriRemoteProtocol tests (iOS-relevant protocol layer)"
depends = ["test:protocol"]

# ─── Relay ───────────────────────────────────────────────────────

[tasks."relay:dev"]
description = "Run Go relay service locally"
run = '''
set -euo pipefail
cd mori-relay
go run . -addr :8080
'''

[tasks."relay:deploy"]
description = "Deploy Go relay to Railway"
run = '''
set -euo pipefail
cd mori-relay
railway up --detach
'''

# ─── Xcode ───────────────────────────────────────────────────────

[tasks."xcode:build"]
description = "Build via xcodebuild"
run = '''
set -euo pipefail
xcodebuild \
  -project "${PROJECT_NAME}.xcodeproj" \
  -scheme "$PROJECT_NAME" \
  -configuration Debug \
  -derivedDataPath "$DERIVED_DATA" \
  build 2>&1 | xcbeautify
'''

[tasks."xcode:test"]
description = "Run Xcode tests"
run = '''
set -euo pipefail
xcodebuild \
  -project "${PROJECT_NAME}.xcodeproj" \
  -scheme "$PROJECT_NAME" \
  -derivedDataPath "$DERIVED_DATA" \
  test 2>&1 | xcbeautify
'''

[tasks."xcode:generate"]
description = "Generate .xcodeproj from Package.swift"
run = "swift package generate-xcodeproj"
