# Mori tmux onboarding preset
#
# This file intentionally stays small and only covers session-scoped defaults
# for Mori-managed sessions. Runtime compatibility and dynamic theme syncing
# stay in Swift because they depend on the active Ghostty theme and tmux server
# environment.
#
# Supported syntax is a small tmux subset parsed by TmuxPresetParser.
# For now Mori only applies session-scoped preset options from this file:
#   set -g <option> <value>

set -g mouse on
set -g status off
